<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>팀 저녁 메뉴 투표</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { text-align:center; font-family:sans-serif; }
    button { margin:5px; padding:10px 20px; cursor:pointer; }
    ul { list-style:none; padding:0; }
    .winner { font-size:20px; color:red; font-weight:bold; }
  </style>
</head>

<body>

<h1>6/29 저녁 메뉴 투표 🍽️</h1>

<input id="username" placeholder="이름 입력 (선택)" />
<br><br>

<div id="buttons"></div>

<br>
<button onclick="closeVote()">투표 종료</button>
<button onclick="resetVote()">리셋</button>

<h2>결과</h2>
<ul id="results"></ul>

<canvas id="chart" width="200" height="200"></canvas>

<script>
// ✅ firebaseConfig 입력
  const firebaseConfig = {
    apiKey: "AIzaSyCbrpsQ2d3wqj6oYyRmTlILLGcWH4oCG04",
    authDomain: "team-dinner-vote.firebaseapp.com",
    projectId: "team-dinner-vote",
    storageBucket: "team-dinner-vote.firebasestorage.app",
    messagingSenderId: "895004011754",
    appId: "1:895004011754:web:1f24dcc2ff0ceb977a7b93",
    measurementId: "G-DYLPHPJ38J"
    };

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const options = ["인천생갈비", "라오충칭훠궈", "아빠회사", "이가네 양갈비"];

let chart;
let lastVoteTime = 0;

// ✅ 버튼 생성
options.forEach(opt => {
  const btn = document.createElement("button");
  btn.innerText = opt;
  btn.onclick = () => vote(opt);
  document.getElementById("buttons").appendChild(btn);
});

// ✅ 투표 (중복 허용 + 스팸 방지)
async function vote(option) {
  const now = Date.now();

  if (now - lastVoteTime < 1000) {
    alert("너무 빠르게 클릭 중 😂");
    return;
  }

  lastVoteTime = now;

  const status = await db.collection("config").doc("status").get();
  if (status.exists && status.data().closed) {
    alert("투표 종료됨");
    return;
  }

  await db.collection("votes").doc(option).set({
    count: firebase.firestore.FieldValue.increment(1)
  }, { merge: true });
}

// ✅ 투표 종료
async function closeVote() {
  await db.collection("config").doc("status").set({ closed: true });
  alert("투표 종료됨");
}

// ✅ 리셋
async function resetVote() {
  if (!confirm("진짜 초기화?")) return;

  const votes = await db.collection("votes").get();
  votes.forEach(doc => doc.ref.delete());

  await db.collection("config").doc("status").set({ closed: false });

  alert("초기화 완료");
}

// ✅ 실시간 결과
db.collection("votes").onSnapshot(snapshot => {
  const list = document.getElementById("results");
  list.innerHTML = "";

  let data = [];
  let total = 0;

  snapshot.forEach(doc => {
    const count = doc.data().count || 0;
    total += count;

    data.push({
      name: doc.id,
      count: count
    });
  });

  // 정렬
  data.sort((a,b)=>b.count-a.count);

  let labels = [];
  let values = [];

  data.forEach((d,i)=>{
    const percent = total ? ((d.count/total)*100).toFixed(1) : 0;

    let li = document.createElement("li");

    if (i === 0 && d.count > 0) {
      li.innerHTML = `👑 <span class="winner">${d.name}: ${d.count}표 (${percent}%)</span>`;
    } else {
      li.innerText = `${d.name}: ${d.count}표 (${percent}%)`;
    }

    list.appendChild(li);

    labels.push(d.name);
    values.push(d.count);
  });

  drawChart(labels, values);
});

// ✅ 원형 그래프
function drawChart(labels, data) {
  const ctx = document.getElementById("chart").getContext("2d");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "pie",
    data: {
      labels: labels,
      datasets: [{
        data: data
      }]
    },
    options: {
      responsive: false,
      plugins: {
        legend: {
          position: "bottom"
        }
      }
    }
  });
}

// ✅ 종료 상태 반영
db.collection("config").doc("status")
.onSnapshot(doc => {
  if (doc.exists && doc.data().closed) {
    document.getElementById("buttons").style.display = "none";
  } else {
    document.getElementById("buttons").style.display = "block";
  }
});

</script>
</body>
</html>
